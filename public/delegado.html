<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delegado — CórdobaLux</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#22c55e;--green-dark:#16a34a;--bg:#030d06;--card:#0a1a0e;--border:rgba(34,197,94,.15);--muted:rgba(255,255,255,.45);--text:#fff}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px;width:100%;max-width:380px}
.logo{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:2px;margin-bottom:4px}
.logo span{color:var(--green)}
.sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.field-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:block}
.input-field{background:rgba(255,255,255,.04);border:1.5px solid rgba(34,197,94,.2);color:#fff;padding:12px 14px;border-radius:12px;font-size:15px;width:100%;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .3s;margin-bottom:14px}
.input-field:focus{border-color:var(--green)}
.btn{background:linear-gradient(135deg,var(--green-dark),var(--green));border:none;color:#fff;padding:13px;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:7px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
/* APP */
#app{display:none;min-height:100vh}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px}
.header-logo span{color:var(--green)}
.main{padding:16px;max-width:500px;margin:0 auto}
.section-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;margin-bottom:12px;margin-top:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700}
.badge-green{background:rgba(34,197,94,.15);color:#22c55e}
.badge-yellow{background:rgba(251,191,36,.15);color:#fbbf24}
.badge-red{background:rgba(239,68,68,.15);color:#f87171}
.badge-gray{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.loader{width:24px;height:24px;border:3px solid rgba(34,197,94,.2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:32px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.partido-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-bottom:8px}
.partido-equipos{font-size:14px;font-weight:600;margin-bottom:8px}
.partido-meta{font-size:11px;color:var(--muted);margin-bottom:10px}
.resultado-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.resultado-input{flex:1;min-width:80px;padding:7px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:13px;font-family:'DM Sans',sans-serif}
.tb-wrap{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.tb-input{width:56px;padding:6px 8px;border-radius:8px;border:1px solid rgba(34,197,94,.2);background:rgba(255,255,255,.05);color:#fff;font-size:13px;text-align:center;font-family:'DM Sans',sans-serif}
.msg{font-size:12px;margin-top:4px}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.empty .icon{font-size:36px;margin-bottom:12px}
.tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.tab{padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(34,197,94,.2);background:transparent;color:var(--muted);white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .2s}
.tab.active{background:rgba(34,197,94,.15);color:var(--green);border-color:rgba(34,197,94,.4)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="logo">DELEGADO<span>LUX</span></div>
    <p class="sub">Panel de delegados · CórdobaLux</p>
    <div class="error-msg" id="login-error"></div>
    <label class="field-label">Email</label>
    <input class="input-field" id="login-email" type="email" placeholder="tu@email.com">
    <label class="field-label">Contraseña</label>
    <input class="input-field" id="login-password" type="password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">ENTRAR →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-logo">DELEGADO<span>LUX</span></div>
    <button onclick="doLogout()" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:7px 14px;border-radius:50px;font-size:12px;font-weight:700;cursor:pointer">Salir</button>
  </div>
  <div class="main">
    <div id="bienvenida" style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:16px;margin-bottom:16px">
      <div style="font-size:14px;font-weight:600">Hola, <span id="nombre-delegado"></span> 👋</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">Panel de carga de resultados</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('hoy',this)">📅 Partidos de hoy</button>
      <button class="tab" onclick="switchTab('torneos',this)">🏆 Mis torneos</button>
    </div>

    <!-- TAB HOY -->
    <div id="tab-hoy">
      <div class="section-title">PARTIDOS DE HOY</div>
      <div id="partidos-hoy-list"><div class="loader"></div></div>
    </div>

    <!-- TAB TORNEOS -->
    <div id="tab-torneos" style="display:none">
      <div class="section-title">MIS TORNEOS</div>
      <div id="torneos-list"><div class="loader"></div></div>
    </div>
  </div>
</div>

<script>
const API = 'https://api.cordobalux.com';
let token = localStorage.getItem('delegado_token');
let usuario = JSON.parse(localStorage.getItem('delegado_usuario') || 'null');

async function apiDel(path, opts={}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const r = await fetch(API + path, { ...opts, headers });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Error');
  return data;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const data = await apiDel('/auth/login', { method:'POST', body:JSON.stringify({email, password, app:'delegado'}) });
    token = data.token;
    usuario = data.usuario;
    localStorage.setItem('delegado_token', token);
    localStorage.setItem('delegado_usuario', JSON.stringify(usuario));
    mostrarApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  }
}

function doLogout() {
  token = null; usuario = null;
  localStorage.removeItem('delegado_token');
  localStorage.removeItem('delegado_usuario');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function mostrarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('nombre-delegado').textContent = usuario?.nombre || '';
  cargarPartidosHoy();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-hoy').style.display = tab === 'hoy' ? 'block' : 'none';
  document.getElementById('tab-torneos').style.display = tab === 'torneos' ? 'block' : 'none';
  if (tab === 'hoy') cargarPartidosHoy();
  if (tab === 'torneos') cargarTorneosDelegado();
}

async function cargarPartidosHoy() {
  const el = document.getElementById('partidos-hoy-list');
  el.innerHTML = '<div class="loader"></div>';
  try {
    const partidos = await apiDel('/torneos/delegado/partidos-hoy');
    if (!partidos.length) {
      el.innerHTML = '<div class="empty"><div class="icon">📅</div>No hay partidos para hoy.</div>';
      return;
    }
    el.innerHTML = partidos.map(p => renderPartido(p)).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="icon">⚠️</div>${e.message}</div>`;
  }
}

function renderPartido(p) {
  const hora = (p.hora_inicio||'').substring(0,5);
  const estado = p.estado === 'jugado' ? '<span class="badge badge-green">✅ Jugado</span>' :
                 p.estado === 'en_curso' ? '<span class="badge badge-yellow">⚡ En curso</span>' :
                 '<span class="badge badge-gray">⏳ Pendiente</span>';
  const yaJugado = p.estado === 'jugado' || p.estado === 'walkover';
  return `
  <div class="partido-card" id="pc-${p.id}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:11px;color:var(--muted)">${p.fase?.toUpperCase()||''} · Gr.${p.grupo||'-'} · R.${p.ronda||'-'} · C.${p.cancha||'-'} · ${hora}hs</span>
      ${estado}
    </div>
    <div class="partido-equipos">${p.pareja1_nombre||'?'} <span style="color:var(--muted)">vs</span> ${p.pareja2_nombre||'?'}</div>
    ${yaJugado ? `<div style="font-size:13px;color:var(--green)">Resultado: ${p.resultado_pareja1||'?'} / ${p.resultado_pareja2||'?'}</div>` : `
    <div class="resultado-form">
      <input class="resultado-input" id="r1-${p.id}" placeholder="6 3 6 4" type="text">
      <span style="color:var(--muted)">vs</span>
      <input class="resultado-input" id="r2-${p.id}" placeholder="3 6 4 6" type="text">
      <button class="btn-sm" onclick="cargarResultado(${p.id})" style="background:var(--green-dark);color:#fff">OK</button>
    </div>
    <div class="tb-wrap">
      <span style="font-size:11px;color:var(--muted)">Tiebreak:</span>
      <input class="tb-input" id="tb1-${p.id}" type="number" placeholder="10" min="0" max="99">
      <span style="color:var(--muted)">-</span>
      <input class="tb-input" id="tb2-${p.id}" type="number" placeholder="5" min="0" max="99">
    </div>
    <div class="msg" id="msg-${p.id}"></div>`}
  </div>`;
}

async function cargarResultado(partidoId) {
  const r1 = document.getElementById('r1-'+partidoId)?.value.trim();
  const r2 = document.getElementById('r2-'+partidoId)?.value.trim();
  const tb1 = document.getElementById('tb1-'+partidoId)?.value.trim();
  const tb2 = document.getElementById('tb2-'+partidoId)?.value.trim();
  const msg = document.getElementById('msg-'+partidoId);
  if (!r1 || !r2) { msg.style.color='#f87171'; msg.textContent='Ingresá los dos resultados.'; return; }
  msg.style.color='var(--muted)'; msg.textContent='Guardando...';
  try {
    const body = { resultado_pareja1: r1, resultado_pareja2: r2 };
    if (tb1 !== '' && tb2 !== '') { body.tiebreak_pareja1 = parseInt(tb1); body.tiebreak_pareja2 = parseInt(tb2); }
    await apiDel('/torneos/delegado/resultado/'+partidoId, { method:'POST', body:JSON.stringify(body) });
    msg.style.color='#22c55e'; msg.textContent='✅ Resultado guardado.';
    setTimeout(() => cargarPartidosHoy(), 1500);
  } catch(e) { msg.style.color='#f87171'; msg.textContent=e.message||'Error.'; }
}

async function cargarTorneosDelegado() {
  const el = document.getElementById('torneos-list');
  el.innerHTML = '<div class="loader"></div>';
  try {
    const torneos = await apiDel('/torneos');
    // Filtrar solo los torneos donde el usuario es delegado
    const misDelegaciones = await apiDel('/torneos/delegado/partidos-hoy');
    const torneoIds = [...new Set(misDelegaciones.map(p => p.torneo_id))];
    const misTorneos = torneos.filter(t => torneoIds.includes(t.id) || t.estado === 'en_curso');
    if (!misTorneos.length) {
      el.innerHTML = '<div class="empty"><div class="icon">🏆</div>No tenés torneos asignados.</div>';
      return;
    }
    const estadoColor = { en_curso:'#fb923c', inscripciones_abiertas:'#4ade80', finalizado:'rgba(255,255,255,.3)', proximamente:'#a78bfa' };
    const estadoLabel = { en_curso:'En curso', inscripciones_abiertas:'Inscripciones abiertas', finalizado:'Finalizado', proximamente:'Próximamente' };
    el.innerHTML = misTorneos.map(t => `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-size:15px;font-weight:700">${t.nombre}</div>
            <div style="font-size:12px;color:var(--muted)">${t.sede||''}</div>
          </div>
          <span style="font-size:11px;font-weight:700;color:${estadoColor[t.estado]||'#fff'};padding:3px 10px;border-radius:20px;border:1px solid ${estadoColor[t.estado]||'rgba(255,255,255,.2)'}">${estadoLabel[t.estado]||t.estado}</span>
        </div>
        <button onclick="verPartidosTorneo(${t.id})" style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);padding:7px 16px;border-radius:50px;font-size:12px;font-weight:700;cursor:pointer;width:100%">Ver partidos pendientes</button>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="icon">⚠️</div>${e.message}</div>`;
  }
}

async function verPartidosTorneo(torneoId) {
  const el = document.getElementById('torneos-list');
  el.innerHTML = '<div class="loader"></div>';
  try {
    const partidos = await apiDel('/torneos/delegado/partidos-hoy?torneo_id='+torneoId);
    const pendientes = partidos.filter(p => p.estado !== 'jugado' && p.estado !== 'walkover');
    if (!pendientes.length) {
      el.innerHTML = '<div class="empty"><div class="icon">✅</div>No hay partidos pendientes para hoy.<br><br><button onclick="cargarTorneosDelegado()" style="background:rgba(255,255,255,.08);border:none;color:#fff;padding:8px 20px;border-radius:50px;font-size:13px;cursor:pointer">← Volver</button></div>';
      return;
    }
    el.innerHTML = `
      <button onclick="cargarTorneosDelegado()" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);padding:7px 16px;border-radius:50px;font-size:12px;cursor:pointer;margin-bottom:14px">← Volver</button>
      ${pendientes.map(p => renderPartido(p)).join('')}`;
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="icon">⚠️</div>${e.message}</div>`;
  }
}

window.onload = () => {
  if (token && usuario) mostrarApp();
};
</script>
</body>
</html>
